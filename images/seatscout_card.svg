<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07091a"/>
      <stop offset="100%" style="stop-color:#0d0f28"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="200" fill="url(#bg)"/>
  <!-- Subtle purple glow behind text -->
  <ellipse cx="300" cy="100" rx="180" ry="60" fill="#7c6af7" opacity="0.07"/>
  <!-- SeatScout logo text - matching site exactly -->
  <text x="300" y="118" text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900" font-size="64" letter-spacing="-1"
    filter="url(#glow)">
    <tspan fill="#ffffff">Seat</tspan><tspan fill="#7c6af7">Scout</tspan>
  </text>
</svg>
