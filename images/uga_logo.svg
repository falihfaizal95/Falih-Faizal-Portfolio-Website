<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 272 90" width="272" height="90">
  <defs>
    <!-- Clip to heraldic shield shape -->
    <clipPath id="sc">
      <path d="M 5,3 H 73 L 73,57 Q 73,86 39,86 Q 5,86 5,57 Z"/>
    </clipPath>
  </defs>

  <!-- Shield: black upper section -->
  <rect x="5" y="3" width="68" height="58" fill="#1a1a1a" clip-path="url(#sc)"/>

  <!-- Shield: red lower section -->
  <rect x="5" y="57" width="68" height="32" fill="#BA0C2F" clip-path="url(#sc)"/>

  <!-- ── Arch icon (white) on black ── -->

  <!-- Base platform -->
  <rect x="14" y="50" width="51" height="3.5" fill="white"/>

  <!-- 4 columns -->
  <rect x="14" y="25" width="3.5" height="25" fill="white"/>
  <rect x="26" y="25" width="3.5" height="25" fill="white"/>
  <rect x="49.5" y="25" width="3.5" height="25" fill="white"/>
  <rect x="61.5" y="25" width="3.5" height="25" fill="white"/>

  <!-- Left arch: col1 to col2 (small bay) -->
  <path d="M 14,33 A 7,8 0 0 1 29.5,33"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center arch: col2 to col3 (wide bay) -->
  <path d="M 26,29 A 15,17 0 0 1 53,29"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Right arch: col3 to col4 (small bay) -->
  <path d="M 49.5,33 A 7,8 0 0 1 65,33"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- "1785" text -->
  <text x="39" y="79"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13" font-weight="700"
        fill="white" letter-spacing="1.5">1785</text>

  <!-- Shield outline (white border) -->
  <path d="M 5,3 H 73 L 73,57 Q 73,86 39,86 Q 5,86 5,57 Z"
        fill="none" stroke="white" stroke-width="3"/>

  <!-- Thin outer stroke for contrast on white background -->
  <path d="M 5,3 H 73 L 73,57 Q 73,86 39,86 Q 5,86 5,57 Z"
        fill="none" stroke="#c8cfd8" stroke-width="1"/>

  <!-- ── Wordmark ── -->
  <!-- "UNIVERSITY OF" -->
  <text x="90" y="40"
        font-family="'Arial', 'Helvetica Neue', Helvetica, sans-serif"
        font-size="14" font-weight="700"
        fill="#1a1a1a" letter-spacing="2.8">UNIVERSITY OF</text>

  <!-- "GEORGIA" -->
  <text x="90" y="76"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="35" font-weight="700"
        fill="#BA0C2F" letter-spacing="1">GEORGIA</text>
</svg>
