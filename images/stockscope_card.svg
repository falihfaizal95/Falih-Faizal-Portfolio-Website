<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0f1923"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="greenGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="140" y1="50"  x2="460" y2="50"  stroke="#1e2d1e" stroke-width="1"/>
  <line x1="140" y1="90"  x2="460" y2="90"  stroke="#1e2d1e" stroke-width="1"/>
  <line x1="140" y1="130" x2="460" y2="130" stroke="#1e2d1e" stroke-width="1"/>
  <line x1="140" y1="165" x2="460" y2="165" stroke="#1e2d1e" stroke-width="1"/>

  <!-- Chart area fill -->
  <path d="M 148,148 L 185,132 L 218,140 L 255,108 L 285,120 L 318,88 L 348,96 L 375,68 L 405,80 L 435,52 L 452,60 L 452,165 L 148,165 Z"
        fill="url(#chartFill)"/>

  <!-- Chart line -->
  <polyline
    points="148,148 185,132 218,140 255,108 285,120 318,88 348,96 375,68 405,80 435,52 452,60"
    fill="none"
    stroke="url(#greenGlow)"
    stroke-width="2.5"
    stroke-linejoin="round"
    stroke-linecap="round"/>

  <!-- Glow dot at end of line -->
  <circle cx="452" cy="60" r="4" fill="#4ade80"/>
  <circle cx="452" cy="60" r="8" fill="#4ade80" opacity="0.2"/>

  <!-- Candlestick bars (subtle, bottom left) -->
  <rect x="155" y="150" width="6" height="15" rx="1" fill="#ef4444" opacity="0.6"/>
  <rect x="167" y="143" width="6" height="22" rx="1" fill="#22c55e" opacity="0.6"/>
  <rect x="179" y="146" width="6" height="18" rx="1" fill="#ef4444" opacity="0.6"/>

  <!-- StockScope text -->
  <!-- "Stock" in white -->
  <text x="300" y="105"
        text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="42"
        fill="#ffffff"
        letter-spacing="-1">Stock</text>

  <!-- "Scope" in green -->
  <text x="300" y="148"
        text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="800"
        font-size="42"
        fill="#4ade80"
        letter-spacing="-1">Scope</text>

  <!-- Tagline -->
  <text x="300" y="170"
        text-anchor="middle"
        font-family="'Inter', Arial, sans-serif"
        font-size="10"
        fill="#4ade80"
        opacity="0.7"
        letter-spacing="3">PAPER TRADING · MARKET RESEARCH</text>
</svg>
